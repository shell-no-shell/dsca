<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路由器管理 - 密码管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'sidebar.html' %}

    <div class="main-content">
        <div class="top-bar">
            <h1>密码管理</h1>
            <div class="top-bar-right">
                <span class="online-status">● 在线</span>
                <span class="username">{{ session.username }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline">退出</a>
            </div>
        </div>

        <div class="content">
            <!-- 管理员密码 -->
            <div class="card">
                <div class="card-header">
                    <h2>管理员密码</h2>
                    <p class="card-subtitle">修改路由器管理后台的登录密码</p>
                </div>
                <div class="card-body">
                    <form id="adminPasswordForm" class="form">
                        <div class="form-group">
                            <label for="admin_old_password">当前密码</label>
                            <input type="password" id="admin_old_password" name="old_password" required>
                        </div>
                        <div class="form-group">
                            <label for="admin_new_password">新密码</label>
                            <input type="password" id="admin_new_password" name="new_password" required minlength="6">
                            <span class="form-hint">密码长度不少于6位</span>
                        </div>
                        <div class="form-group">
                            <label for="admin_confirm_password">确认新密码</label>
                            <input type="password" id="admin_confirm_password" name="confirm_password" required minlength="6">
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">修改密码</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- WiFi密码 -->
            <div class="card">
                <div class="card-header">
                    <h2>WiFi密码</h2>
                    <p class="card-subtitle">修改无线网络的连接密码</p>
                </div>
                <div class="card-body">
                    <div class="tabs">
                        <div class="tab-nav">
                            <button class="tab-btn active" data-tab="wifi_2g">2.4G WiFi</button>
                            <button class="tab-btn" data-tab="wifi_5g">5G WiFi</button>
                        </div>

                        <div class="tab-content active" id="tab_wifi_2g">
                            <form class="wifi-password-form form" data-band="wifi_2g">
                                <div class="form-group">
                                    <label>当前SSID</label>
                                    <input type="text" value="Home_Router_2G" disabled class="input-disabled">
                                </div>
                                <div class="form-group">
                                    <label for="wifi_2g_old_password">当前WiFi密码</label>
                                    <input type="password" id="wifi_2g_old_password" name="old_password" required>
                                </div>
                                <div class="form-group">
                                    <label for="wifi_2g_new_password">新WiFi密码</label>
                                    <input type="password" id="wifi_2g_new_password" name="new_password" required minlength="8">
                                    <span class="form-hint">密码长度不少于8位</span>
                                </div>
                                <div class="form-group">
                                    <label for="wifi_2g_confirm_password">确认新密码</label>
                                    <input type="password" id="wifi_2g_confirm_password" name="confirm_password" required>
                                </div>
                                <div class="form-actions">
                                    <button type="submit" class="btn btn-primary">修改WiFi密码</button>
                                </div>
                            </form>
                        </div>

                        <div class="tab-content" id="tab_wifi_5g">
                            <form class="wifi-password-form form" data-band="wifi_5g">
                                <div class="form-group">
                                    <label>当前SSID</label>
                                    <input type="text" value="Home_Router_5G" disabled class="input-disabled">
                                </div>
                                <div class="form-group">
                                    <label for="wifi_5g_old_password">当前WiFi密码</label>
                                    <input type="password" id="wifi_5g_old_password" name="old_password" required>
                                </div>
                                <div class="form-group">
                                    <label for="wifi_5g_new_password">新WiFi密码</label>
                                    <input type="password" id="wifi_5g_new_password" name="new_password" required minlength="8">
                                    <span class="form-hint">密码长度不少于8位</span>
                                </div>
                                <div class="form-group">
                                    <label for="wifi_5g_confirm_password">确认新密码</label>
                                    <input type="password" id="wifi_5g_confirm_password" name="confirm_password" required>
                                </div>
                                <div class="form-actions">
                                    <button type="submit" class="btn btn-primary">修改WiFi密码</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // 管理员密码修改
        document.getElementById('adminPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                old_password: document.getElementById('admin_old_password').value,
                new_password: document.getElementById('admin_new_password').value,
                confirm_password: document.getElementById('admin_confirm_password').value
            };
            fetch('/api/password/admin', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(r => r.json())
            .then(res => {
                if (res.success) {
                    showToast(res.message, 'success');
                    this.reset();
                } else {
                    showToast(res.message, 'error');
                }
            });
        });

        // WiFi密码修改
        document.querySelectorAll('.wifi-password-form').forEach(form => {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                const band = this.dataset.band;
                const data = {
                    band: band,
                    old_password: this.querySelector('[name="old_password"]').value,
                    new_password: this.querySelector('[name="new_password"]').value,
                    confirm_password: this.querySelector('[name="confirm_password"]').value
                };
                fetch('/api/password/wifi', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                })
                .then(r => r.json())
                .then(res => {
                    if (res.success) {
                        showToast(res.message, 'success');
                        this.reset();
                    } else {
                        showToast(res.message, 'error');
                    }
                });
            });
        });
    </script>
</body>
</html>
