<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路由器管理 - 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="router-icon">
                    <svg viewBox="0 0 24 24" width="64" height="64">
                        <path fill="currentColor" d="M12,2C6.48,2 2,6.48 2,12s4.48,10 10,10s10,-4.48 10,-10S17.52,2 12,2z M12,6c1.1,0 2,0.9 2,2s-0.9,2 -2,2s-2,-0.9 -2,-2s0.9,-2 2,-2z M16,17H8v-2h8V17z"/>
                    </svg>
                </div>
                <h1>路由器管理</h1>
                <p class="subtitle">家用路由器管理程序 v2.1.0</p>
            </div>

            {% if error %}
            <div class="alert alert-error">
                <span class="alert-icon">&#9888;</span>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入管理员用户名" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入管理员密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">登 录</button>
            </form>

            <div class="login-footer">
                <p>默认用户名: admin | 默认密码: admin123</p>
                <p class="hint">首次登录请立即修改密码</p>
            </div>
        </div>
    </div>
</body>
</html>
